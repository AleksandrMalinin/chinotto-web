<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background – same as landing -->
  <rect width="1200" height="630" fill="#0a0a0e"/>
  <!-- Soft radial glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%">
      <stop offset="0%" stop-color="rgba(138,148,200,0.12)"/>
      <stop offset="50%" stop-color="rgba(138,148,200,0.04)"/>
      <stop offset="100%" stop-color="rgba(138,148,200,0)"/>
    </radialGradient>
    <!-- Subtle glow behind tagline for readability at small sizes -->
    <filter id="textglow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feFlood flood-color="#fff" flood-opacity="0.08" result="flood"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="600" cy="284" rx="500" ry="280" fill="url(#glow)"/>
  <!-- Real Chinotto logo: ~15% larger for OG preview -->
  <g transform="translate(600,200) scale(2.16) translate(-32,-32)">
    <circle cx="32" cy="32" r="28" stroke="#8a94c8" stroke-width="2" fill="none"/>
    <circle cx="32" cy="20" r="6" fill="#8a94c8"/>
    <circle cx="22" cy="34" r="5" fill="#8a94c8"/>
    <circle cx="42" cy="34" r="5" fill="#8a94c8"/>
    <circle cx="32" cy="44" r="4" fill="#8a94c8"/>
  </g>
  <!-- Title – Inter, same as site -->
  <text x="600" y="360" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="300" fill="#e4e4e9" text-anchor="middle" letter-spacing="-0.02em">Chinotto</text>
  <!-- Subtitle – larger, brighter, subtle glow for readability in previews -->
  <text x="600" y="408" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="300" fill="#c2c6d0" text-anchor="middle" letter-spacing="-0.01em" filter="url(#textglow)">Capture first. Revisit later.</text>
</svg>
